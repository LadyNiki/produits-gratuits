<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Administration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Ajouter un produit</h1>

<form id="formProduit">

<input id="nom" placeholder="Nom du produit"><br><br>

<input id="categorie" placeholder="Catégorie"><br><br>

<input id="prix" placeholder="Prix"><br><br>

<label>Image du produit :</label><br>

<input type="file" id="image" accept="image/*"><br><br>

<input id="lien" placeholder="Lien du produit"><br><br>

<button type="submit">Ajouter</button>

</form>

<script src="admin.js"></script>

</body>
</html>
