<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Modifier un produit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>✏️ Modifier un produit</h1>

<form id="formModifier">

  <input id="nom" placeholder="Nom du produit" required><br><br>

  <input id="categorie" placeholder="Catégorie" required><br><br>

  <input id="prix" placeholder="Prix" required><br><br>

  <input id="lien" placeholder="Lien du produit" required><br><br>

  <button type="submit">
    Enregistrer
  </button>

</form>

<script src="modifier.js"></script>

</body>
</html>
